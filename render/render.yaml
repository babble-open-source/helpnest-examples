services:
  - type: web
    name: helpnest-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: helpnest-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: helpnest-redis
          property: connectionString
      - key: QDRANT_URL
        value: http://localhost:6333
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: helpnest-db
    plan: starter
    databaseName: helpnest
    user: helpnest

  - name: helpnest-redis
    type: redis
    plan: starter
    ipAllowList: []
